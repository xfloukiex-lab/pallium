name: check
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: required files present and non-empty
        run: |
          set -e
          for f in flake.nix modules/default.nix modules/gateway.nix modules/sandbox.nix \
                   LICENSE README.md ARCHITECTURE.md ROADMAP.md CONTRIBUTING.md docs/index.html; do
            test -s "$f" || { echo "missing or empty: $f"; exit 1; }
          done
          echo "structure OK"
      - name: no secrets or private keys committed
        run: |
          if grep -rIlE 'BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY|ghp_[A-Za-z0-9]{30,}|xox[baprs]-[A-Za-z0-9-]{10,}' \
               --exclude-dir=.git .; then
            echo "potential secret detected"; exit 1
          fi
          echo "secret scan OK"
